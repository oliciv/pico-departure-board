<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h1 {
      color: #4cc9f0;
    }

    h2 {
      color: #7b8cde;
      margin-top: 24px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
    }

    input[type=text] {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      margin-top: 24px;
      padding: 12px 24px;
      background: #4cc9f0;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Pico Departure Board Setup</h1>
  <form method="POST" action="/">
    {{FORM_FIELDS}}
    <button type="submit">Save</button>
  </form>
</body>

</html>
